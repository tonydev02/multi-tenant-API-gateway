name: Deploy Frontend (Cloudflare Pages)

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-cloudflare.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Cloudflare Pages Deploy
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PAGES_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger deploy hook
        if: ${{ env.CLOUDFLARE_PAGES_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$CLOUDFLARE_PAGES_DEPLOY_HOOK_URL"

      - name: Skip deploy when hook is not configured
        if: ${{ env.CLOUDFLARE_PAGES_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "::warning::CLOUDFLARE_PAGES_DEPLOY_HOOK_URL is not configured; skipping deploy."
